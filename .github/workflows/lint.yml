name: Lint

# Lightweight static checks that run on every push / PR. (The release workflow
# only runs on a version tag, so this gives PRs a fast, dependency-light gate.)
#
# Checks:
#   - .plg is well-formed XML (xmllint)
#   - pkg_build.sh has valid bash syntax (bash -n) + shellcheck
#   - every PHP file lints (php -l), including the PHP body of each .page shim
#     (the part after the `---` separator)

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

# Cancel a superseded run when a newer push/PR-sync arrives on the same ref, so
# rapid pushes don't pile up redundant lint runs. Keyed per-ref so different
# branches/PRs never cancel each other. (Efficiency only - does not change which
# checks are required or their pass/fail semantics.)
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate .plg is well-formed XML
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxml2-utils
          xmllint --noout unraid.rsync.plg
          echo "unraid.rsync.plg: well-formed XML"

      - name: Check pkg_build.sh syntax + shellcheck
        run: |
          bash -n pkg_build.sh
          sudo apt-get install -y -qq shellcheck
          shellcheck pkg_build.sh
          echo "pkg_build.sh: syntax + shellcheck clean"

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"

      - name: php -l on PHP files and .page bodies
        run: |
          set -e
          # Standalone PHP files
          find source -name "*.php" -print0 | while IFS= read -r -d '' f; do
            echo "linting $f"
            php -l "$f"
          done
          # .page shims: lint only the PHP body (after the line that is exactly ---)
          for pg in $(find source -name "*.page"); do
            body="$(mktemp --suffix=.php)"
            awk 'p{print} /^---$/{p=1}' "$pg" > "$body"
            if [ -s "$body" ]; then
              echo "linting PHP body of $pg"
              php -l "$body"
            fi
            rm -f "$body"
          done
          echo "all PHP lints clean"

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          tools: composer

      - name: Validate composer.json + composer.lock
        # Guards that the committed lock is in sync with composer.json (a stale
        # lock here means someone edited composer.json without re-locking).
        run: composer validate --no-check-publish

      - name: Install dependencies
        # With the committed lock present, this installs the exact pinned
        # versions (incl. the phpunit dev dependency), so CI runs are reproducible.
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Check code style (php-cs-fixer)
        # PSR-12-based gate over the pure-PHP backend + tests (config in
        # .php-cs-fixer.dist.php). --dry-run fails the build on any unformatted
        # file without modifying anything; run `composer cs-fix` locally to fix.
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=never

      - name: PHPStan static analysis
        # Analyses the proc_open/ssh/rsync shell-out classes + CLI scripts
        # (config in phpstan.neon.dist). A baseline absorbs pre-existing
        # intentional findings, so this only fails on NEW regressions. The higher
        # memory limit matches PHPStan's reflection needs.
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # gitleaks scans the full commit history on push and the PR diff on
          # pull_request, so it needs more than the default shallow clone.
          fetch-depth: 0

      - name: Scan for committed secrets (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # No SARIF/artifact upload; a finding just fails the job in the log.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
