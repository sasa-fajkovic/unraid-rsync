name: Release

# Auto-publish a versioned GitHub Release on every merge to `main`.
#
# Flow: build the Slackware .txz inside aclemons/slackware:15.0 (which also
# rewrites the .plg's version + md5 ENTITYs to match the freshly built package),
# then publish a GitHub Release with BOTH the .txz and the regenerated .plg
# attached, and mark it `latest`. The published .plg is the AUTHORITATIVE
# manifest: installed plugins check
#   https://github.com/<user>/<repo>/releases/latest/download/unraid.rsync.plg
# (the `pluginURL` ENTITY) for updates, so there is no need to sync the
# regenerated .plg back to `main` - the repo .plg is just the source template.
# That means NO commit-back, NO sync PR, and therefore no release->commit loop.
#
# Triggers:
#   - push to `main` (i.e. a merge): auto-computes the next version for today, or
#   - manual workflow_dispatch with an optional explicit version input.
# A PR's `pull_request` event does NOT match `push: [main]`, so opening/updating
# a PR never cuts a release - only the merge to `main` does.
#
# Concurrency: overlapping `main` pushes serialize (cancel-in-progress: false) so
# two runs never race to compute the same same-day version.
#
# NOTE: third-party actions are SHA-pinned (with a trailing `# vX` comment) and
# bumped by Dependabot. action-gh-release is on v3 (Node 24 runtime), which
# clears the earlier Node 20 deprecation warning.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (YYYY.MM.DD[x]). Blank => auto-compute next same-day version."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine version + build ref
        id: version
        # The dispatch input is user-controlled, so it is passed via env (never
        # interpolated into the shell with ${{ }}) and then format-validated
        # before use. This avoids shell injection in a workflow that has
        # contents: write. GH_TOKEN lets `gh release list` enumerate existing
        # same-day tags for the auto-bump path.
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          GIT_SHA: ${{ github.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # build_ref is always the commit this run is for (the merge commit on
          # main, or the dispatch commit). The artifact is built from it.
          build_ref="$GIT_SHA"

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION" ]; then
            # Explicit manual version: validate the user-supplied value, use as-is.
            version="$INPUT_VERSION"
            if ! printf '%s' "$version" | grep -Eq '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}[a-z]?$'; then
              echo "ERROR: invalid version '$version' (expected YYYY.MM.DD or YYYY.MM.DDx)." >&2
              exit 1
            fi
          else
            # Auto-compute the next version for today (push to main, or a blank
            # dispatch). Same-day sequence is strcmp-monotonic so Unraid's
            # update detection (lexicographic version compare) always sees a
            # strictly greater version: <today> (index 0), then <today>a (1),
            # <today>b (2), ... <today>z (26).
            today="$(date +%Y.%m.%d)"
            # Escape the dots so the regex matches literally, not "any char".
            today_re="$(printf '%s' "$today" | sed 's/\./\\./g')"

            # Highest same-day index seen so far. -1 means none exist yet.
            max_index=-1
            while IFS= read -r tag; do
              [ -n "$tag" ] || continue
              # Keep only tags for today: bare date or date + single a-z suffix.
              if ! printf '%s' "$tag" | grep -Eq "^${today_re}[a-z]?$"; then
                continue
              fi
              suffix="${tag#"$today"}"   # "" for the bare date, else one letter
              if [ -z "$suffix" ]; then
                index=0
              else
                # Map a->1 ... z->26 via its position in the alphabet.
                index=$(printf '%s' "abcdefghijklmnopqrstuvwxyz" | awk -v c="$suffix" '{print index($0, c)}')
              fi
              if [ "$index" -gt "$max_index" ]; then
                max_index="$index"
              fi
            done < <(gh release list --limit 200 --json tagName -q '.[].tagName')

            if [ "$max_index" -lt 0 ]; then
              # No release for today yet -> use the bare date.
              version="$today"
            else
              next_index=$((max_index + 1))
              if [ "$next_index" -gt 26 ]; then
                echo "ERROR: ran out of same-day suffixes for $today (max is ${today}z)." >&2
                echo "       Wait for tomorrow's date, or set an explicit version via the" >&2
                echo "       Release workflow's workflow_dispatch 'version' input." >&2
                exit 1
              fi
              # next_index 1..26 -> a..z (the Nth letter of the alphabet).
              letter="$(printf '%s' "abcdefghijklmnopqrstuvwxyz" | cut -c "$next_index")"
              version="${today}${letter}"
            fi
          fi

          # Final defensive validation (also covers the auto-computed value).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]{4}\.[0-9]{2}\.[0-9]{2}[a-z]?$'; then
            echo "ERROR: computed invalid version '$version'." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_ref=$build_ref" >> "$GITHUB_OUTPUT"
          echo "Building version $version from ref $build_ref"

      - name: Build .txz inside Slackware container
        # VERSION (validated above) is passed into the container via -e and
        # referenced as a shell variable rather than interpolated with ${{ }},
        # so it cannot break out of the shell command. Invoked as `bash
        # pkg_build.sh` so the build does not depend on the file's exec bit.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker run --rm -e VERSION -v "$PWD":/workspace -w /workspace \
            aclemons/slackware:15.0@sha256:c4fff5e20f3fce49bb1a51f62c57cc2314e68d4aa0e15ad6067659c71c552ede \
            bash -c 'bash pkg_build.sh -y -V "$VERSION"'
          sudo chown -R "$(id -u):$(id -g)" .

      - name: Stage the regenerated .plg alongside the .txz
        # pkg_build.sh rewrote unraid.rsync.plg (real version+md5). Attach it to
        # the Release as the authoritative manifest that `releases/latest`
        # serves for install + auto-update.
        run: cp unraid.rsync.plg archive/unraid.rsync.plg

      - name: Create GitHub Release (.txz + .plg)
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          # The tag does not exist yet (no tag trigger anymore); pin it to
          # build_ref - the commit the .txz was built from - so tag/release
          # match the artifact.
          target_commitish: ${{ steps.version.outputs.build_ref }}
          # Always point releases/latest here so the latest-download redirect
          # the plugin's pluginURL relies on resolves to this release's .plg.
          make_latest: true
          files: |
            archive/*.txz
            archive/unraid.rsync.plg
          generate_release_notes: true
