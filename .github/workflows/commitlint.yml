name: commitlint

# The repo squash-merges, so the PR TITLE becomes the commit subject on main (and
# the auto-generated release-note line). Lint it against Conventional Commits.
#
# This lives in its own workflow (not lint.yml) so it can also fire on `edited`:
# fixing a rejected title then re-validates without a new push, and editing the
# PR description never needlessly re-runs PHPUnit / PHPStan / gitleaks.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli@^19 @commitlint/config-conventional@^19

      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | npx commitlint --verbose
